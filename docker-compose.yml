services:
  api-1:
    image: rpxc/fraud-detector-api:latest
    environment:
      - INSTANCE_ID=1
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api-2:
    image: rpxc/fraud-detector-api:latest
    environment:
      - INSTANCE_ID=2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"

networks:
  rinha-net:
    driver: bridge
